<!doctype html>
<html lang="en">
  <head>
    <title>HTML Template</title>
  </head>
  <body>
    <script>
      const letters = 'abcdefghijklmnopqrstuvwxyz';

      for (let a = 0; a < 26; a++) {
        for (let b = 0; b < 26; b++) {
          for (let c = 0; c < 26; c++) {
            for (let d = 0; d < 26; d++) {
              console.log(letters[a] + letters[b] + letters[c] + letters[d]);
            }
          }
        }
      }
    </script>
  </body>
</html>
