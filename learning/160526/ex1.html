<!doctype html>
<html lang="en">
  <head>
    <title>HTML Template</title>
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card shadow-sm">
            <div class="card-body">
              <h2 class="card-title mb-3">Double and Add</h2>
              <p class="mb-4">
                Enter a number and click the button to see
                <b>(number × 2) + bonus</b>.
              </p>
              <form
                class="row g-3 align-items-center"
                onsubmit="event.preventDefault(); handleClick();"
              >
                <div class="col-auto">
                  <label for="num" class="col-form-label">Number:</label>
                </div>
                <div class="col-auto">
                  <input
                    type="number"
                    class="form-control"
                    id="num"
                    value="5"
                  />
                </div>
                <div class="col-auto">
                  <button type="submit" class="btn btn-primary">
                    Calculate
                  </button>
                </div>
              </form>
              <div class="result mt-4 fw-bold" id="result">Result: 20</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const result = document.querySelector('.result');

      const calculate = (inputValue, b = 10) => {
        const resultValue = Number(inputValue) * 2 + b;
        result.innerHTML = `Result: ${resultValue}`;
      };

      function handleClick() {
        const inputValue = document.querySelector('#num').value;
        calculate(inputValue);
      }
    </script>
  </body>
</html>
