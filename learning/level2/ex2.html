<!doctype html>
<html>
  <head>
    <title>Bootstrap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
          <div class="card">
            <div class="card-body">
              <h1>Favorite Fruits List</h1>
              <p>
                Click the button to show a list of favorite fruits using
                <span class="text-danger">Array.forEach</span>.
              </p>
              <button
                class="btn bg-success text-white mb-3"
                onclick="renderFruits()"
              >
                Show Fruits
              </button>
              <ul class="list-group list-fruits"></ul>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      let fruits = ['apple', 'banana', 'plum', 'mango', 'peach'];

      function renderFruits() {
        const list = document.querySelector('.list-fruits');
        let html = '';

        fruits.forEach((fruit) => {
          html += '<li class="list-group-item">' + fruit + '</li>';
        });

        list.innerHTML = html;
      }
    </script>
  </body>
</html>
