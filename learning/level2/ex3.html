<!doctype html>
<html>
  <head>
    <title>Bootstrap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h2 class="card-title mb-3">Student Scoreboard with Array.map</h2>
              <p class="mb-4">
                Click the button to transform student objects into richer
                objects with <code>grade</code>, <code>passed</code>, and
                <code>badge</code>.
              </p>

              <button class="btn btn-primary mb-3" onclick="renderScoreboard()">
                Build Scoreboard
              </button>

              <div id="result"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>

  <script>
    const students = [
      { name: 'Jack Vo', score: 80 },
      { name: 'Naomi Vo', score: 40 },
      { name: 'Sarah Hoang', score: 96 },
    ];

    function getGrade(score) {
      if (score >= 90) {
        return 'A';
      } else if (score >= 80) {
        return 'B';
      } else if (score >= 70) {
        return 'C';
      } else if (score >= 60) {
        return 'D';
      } else {
        return 'F';
      }
    }

    function passTest(score) {
      if (score >= 60) {
        return true;
      } else {
        return false;
      }
    }

    function getMessage(passed) {
      if (passed === true) {
        return 'Good Job! Keep it up.';
      } else {
        return 'Keep trying.';
      }
    }

    const gradedStudents = students.map((currentItem, index) => {
      const grade = getGrade(currentItem.score);
      const passed = passTest(currentItem.score);
      const message = getMessage(passed);

      return {
        name: currentItem.name,
        score: currentItem.score,
        grade: grade,
        passed: passed,
        message: message,
      };
    });

    console.log(gradedStudents);

    // make theeeeeeeeee table bruh
    gradedStudents.forEach();
  </script>
</html>
