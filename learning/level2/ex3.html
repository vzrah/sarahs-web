<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Level 2 - Exercise 3: Array.map</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h2 class="card-title mb-3">Student Scoreboard with Array.map</h2>
              <p class="mb-4">
                Click the button to transform student objects into richer
                objects with <code>grade</code>, <code>passed</code>, and
                <code>badge</code>.
              </p>

              <button class="btn btn-primary mb-3" onclick="renderScoreboard()">
                Build Scoreboard
              </button>

              <div id="result"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const students = [
        { name: 'Lina', score: 95 },
        { name: 'Tom', score: 68 },
        { name: 'Sokha', score: 82 },
        { name: 'Nita', score: 74 },
        { name: 'Dara', score: 59 },
      ];

      function getGrade(grade) {}
      function renderScoreboard() {
        const finalResults = students.map((currentItem, index) => {
          return {
            ...currentItem,
            grade: getGrade(currentItem.score),
            passed: currentItem.score >= 60,
          };
        });

        console.log(finalResults);
      }
    </script>
  </body>
</html>
