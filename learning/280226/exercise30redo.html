<!doctype html>
<html>
  <head>
    <title>Image Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="container">
      <h1 class="text-center my-5">
        <i class="bi bi-images me-2"></i>Image Gallery
      </h1>
      <div class="row row-cols-1 row-cols-md-3 row-gap-4 gallery"></div>
    </div>

    <!-- Button trigger modal -->

    <!-- Modal -->

    <script>
      let images = [
        {
          name: 'Mountain Lake',
          url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600',
        },
        {
          name: 'Forest Path',
          url: 'https://images.unsplash.com/photo-1448375240586-882707db888b?w=600',
        },
        {
          name: 'Ocean Sunset',
          url: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600',
        },
        {
          name: 'City Skyline',
          url: 'https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=600',
        },
        {
          name: 'Desert Dunes',
          url: 'https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=600',
        },
      ];

      let card = '';

      for (let i = 0; i < images.length; i++) {
  let currentImage = images[i];

  let card = `
    <div class="col">
      <div class="card">
        <img src="${currentImage.url}" class="card-img-top" alt="${currentImage.name}" />
        <div class="card-body">
          <h5 class="card-title">${currentImage.name}</h5>
          <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal-${i}">
            Description
          </button>
        </div>
      </div>
      
      <div class="modal fade" id="modal-${i}" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">${currentImage.name}</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              This is the description for ${currentImage.name}.
            </div>
            <div class="modal-footer">
              <a href="${currentImage.url}" target="_blank" class="btn btn-primary">Image Link</a>
            </div>
          </div>
        </div>
      </div>
    </div>`;

  document.querySelector('.gallery').innerHTML += card;
}
    </script>
  </body>
</html>
